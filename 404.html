<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>404 - Page Not Found</title>
	<link rel="icon" href="/favicon.ico" type="image/x-icon">
	<meta name="robots" content="noindex">
	<style>
		:root {
			--bg: #181818;
			--card: #120e0d;
			--border: #333333;
			--navbg: #2c2c3d;
			--purple: #ba3ef0;
			--teal: #48c9b0;
			--red: #ff5555;
			--yellow: #ffcc00;
			--green: #2df505;
			--pink: #FF8FAB;
			--muted: #8a8a8a;
		}

		::selection { background: var(--red); color: #000; }

		* { margin: 0; padding: 0; box-sizing: border-box; }

		html { font-size: 22px; }

		body {
			font-family: 'Courier New', monospace;
			background-color: var(--bg);
			color: #fff;
			line-height: 1.4;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			text-align: center;
		}

		header {
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 1.5rem 1rem;
			background-color: var(--navbg);
			border-bottom: 2px solid #282138;
			min-height: 70px;
		}

		.nav-bar ul {
			list-style: none;
			display: flex;
			gap: 2rem;
			align-items: center;
		}

		.nav-bar li a {
			text-decoration: none;
			color: #fff;
			font-size: 1.1rem;
			padding: 0.6rem 1.2rem;
			border-radius: 25px;
			transition: all 0.3s ease;
			display: inline-block;
			border: 2px solid transparent;
		}

		.nav-bar li a:hover {
			background-color: #5734c9;
			color: var(--yellow);
			transform: translateY(-2px);
			box-shadow: 0 5px 15px rgba(87, 52, 201, 0.4);
		}

		.nav-bar li a.home-link {
			background-color: rgba(72, 201, 176, 0.1);
			border: 2px solid var(--teal);
		}

		.nav-bar li a.home-link:hover {
			background-color: var(--teal);
			color: #1e1e2f;
		}

		main {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 1.6rem;
			padding: 3rem 1.5rem;
		}

		.glitch {
			position: relative;
			font-size: clamp(5rem, 26vw, 11rem);
			font-weight: bold;
			letter-spacing: 0.06em;
			color: #ececec;
			text-shadow: 0 0 18px rgba(186, 62, 240, 0.25);
			line-height: 1;
			user-select: none;
		}

		.glitch::before,
		.glitch::after {
			content: attr(data-text);
			position: absolute;
			inset: 0;
			background: var(--bg);
			overflow: hidden;
		}

		.glitch::before {
			left: 3px;
			color: var(--red);
			clip-path: inset(0 0 55% 0);
			animation: glitch-top 2.6s infinite steps(2, end);
		}

		.glitch::after {
			left: -3px;
			color: var(--teal);
			clip-path: inset(55% 0 0 0);
			animation: glitch-bottom 3.4s infinite steps(2, end);
		}

		@keyframes glitch-top {
			0%, 64%, 100% { transform: translate(0, 0); }
			66% { transform: translate(3px, -2px); }
			70% { transform: translate(-4px, 1px); }
			74% { transform: translate(2px, 1px); }
		}

		@keyframes glitch-bottom {
			0%, 54%, 100% { transform: translate(0, 0); }
			56% { transform: translate(-3px, 2px); }
			60% { transform: translate(4px, -1px); }
			64% { transform: translate(-2px, 1px); }
		}

		.subtitle {
			color: #e0e0e0;
			font-size: 1.5rem;
			margin-top: -0.4rem;
		}

		.subtitle .blink {
			color: var(--green);
			animation: blink 1.1s steps(1, end) infinite;
		}

		@keyframes blink { 50% { opacity: 0; } }

		.msg {
			color: var(--pink);
			max-width: 620px;
			font-size: 1rem;
		}

		.btn-home {
			display: inline-block;
			text-decoration: none;
			padding: 0.8rem 2.1rem;
			border: 2px solid var(--teal);
			border-radius: 30px;
			background: rgba(72, 201, 176, 0.08);
			color: var(--teal);
			font-family: inherit;
			font-size: 1.05rem;
			transition: all 0.3s ease;
		}

		.btn-home:hover {
			background: var(--teal);
			color: #1e1e2f;
			transform: translateY(-2px);
			box-shadow: 0 6px 18px rgba(72, 201, 176, 0.3);
		}

		.quick {
			color: var(--muted);
			font-size: 0.9rem;
		}

		.quick a {
			color: var(--purple);
			text-decoration: none;
			transition: color 0.3s ease;
		}

		.quick a:hover { color: var(--yellow); }

		.sep { color: #555; margin: 0 0.45rem; }

		footer {
			padding: 1.5rem 1rem 2rem;
			color: var(--muted);
			font-size: 0.85rem;
			border-top: 1px solid var(--border);
			max-width: 800px;
			margin: 0 auto;
			width: 100%;
		}

		footer a { color: var(--purple); text-decoration: none; }
		footer a:hover { color: var(--yellow); }

		@media screen and (max-width: 768px) {
			html { font-size: 17px; }

			.nav-bar { width: 100%; }
			.nav-bar ul {
				flex-direction: column;
				gap: 0.8rem;
				width: 100%;
				padding: 0 1rem;
			}
			.nav-bar li { width: 100%; }
			.nav-bar li a {
				display: block;
				width: 100%;
				text-align: center;
				background-color: #3a3a4d;
				border-radius: 15px;
			}
			.nav-bar li a:hover { transform: none; }

			main { padding: 2rem 1rem; }
			.subtitle { font-size: 1.2rem; }
		}

		@media (prefers-reduced-motion: reduce) {
			* { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
			.glitch::before, .glitch::after { display: none; }
			.subtitle .blink { animation: none; }
			.btn-home:hover, .nav-bar li a:hover { transform: none; }
		}
	</style>
</head>
<body>
	<header>
		<nav class="nav-bar" aria-label="Primary">
			<ul>
				<li><a class="home-link" href="index.html" title="Back to main page">Home</a></li>
				<li><a href="index.html#offensive" title="Posts about offensive security">Offensive</a></li>
				<li><a href="index.html#defensive" title="Posts about defensive security">Defensive</a></li>
				<li><a href="index.html#writeups" title="CTF writeups">Writeups</a></li>
				<li><a href="certs.html" title="Certifications earned and planned">Certs</a></li>
			</ul>
		</nav>
	</header>

	<main>
		<h1 class="glitch" data-text="404" aria-label="Error 404 - page not found">404</h1>
		<p class="subtitle">Page Not Found<span class="blink">_</span></p>

		<p class="msg">The page you're looking for doesn't exist, was moved, or never existed in the first place.</p>

		<a class="btn-home" href="index.html">← Back to Home</a>

		<p class="quick">
			or jump to:
			<a href="index.html#offensive">Offensive</a><span class="sep">/</span>
			<a href="index.html#defensive">Defensive</a><span class="sep">/</span>
			<a href="index.html#writeups">Writeups</a><span class="sep">/</span>
			<a href="certs.html">Certs</a>
		</p>
	</main>

	<footer>
		<a href="index.html">← Home</a> · <a href="https://github.com/IvanT7D3" target="_blank" rel="noopener">Github</a>
	</footer>
</body>
</html>
